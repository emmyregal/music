<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone.js Starter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #ea6690 0%, #ed883a 100%);
        }
        .container {
            text-align: center;
            background: rgb(233, 143, 69);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 {
            color: #9d1b5a;
            margin-bottom: 30px;
        }
        button {
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #ea66b1;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #e67534;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>first attempt</h1>
        <button onclick="playNote()">Play Note (C4)</button>
        <button onclick="playChord()">Play Chord</button>
        <button onclick="playSequence()">Play Sequence</button>
        <button onclick="startLoop()">Start Loop</button>
        <button onclick="stopAll()">Stop All</button>
        <button onclick="pattern()">pattern</button>

        <button onclick = "playA1()">play A1</button>
        <button onclick  ="playA2()">play A2</button>
        <button onclick  ="playA3()">play A3</button>
        <button onclick  ="playA4()">play A4</button>
        <button onclick  ="playA5()">play A5</button>
        <button onclick  ="playA6()">play A6</button>
        <button onclick  ="playA7()">play A7</button>
        <button onclick  ="playA8()">play A8</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="app.js"></script>
</body>
</html>
